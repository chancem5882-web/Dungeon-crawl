<link rel="stylesheet" href="/static/style.css">

<div class="header">
DUNGEON CONTROL PANEL
</div>

<div class="layout">

<div>

<div class="card">

{% if character[2] %}
<img src="{{character[2]}}" class="portrait">
{% endif %}

<form
action="/upload/{{character[0]}}"
method="post"
enctype="multipart/form-data"
>

<input type="file" name="image">

<button type="submit">
Upload Portrait
</button>

</form>

<h2>{{character[1]}}</h2>

<label>Level</label>
<input name="level" value="{{meta[1]}}">

<label>HP</label>
<input name="hp" value="{{meta[2]}}">

<label>Max HP</label>
<input name="max_hp" value="{{meta[3]}}">

<label>Gold</label>
<input name="gold" value="{{meta[4]}}">

</div>

</div>

<div>

<div class="card">

<h2>Equipment</h2>

<textarea
name="equipment"
rows="12"
>{{meta[8]}}</textarea>

<h3>Parsed Skills</h3>

{% for s in skills %}
<div class="skill">
{{s[1]}} +{{s[2]}}
</div>
{% endfor %}

<h3>Parsed Percentages</h3>

{% for p in percentages %}
<div class="skill">
{{p[1]}} {{p[2]}}%
</div>
{% endfor %}

<h3>Conditions</h3>

{% for c in conditions %}
<div class="condition">
{{c[1]}}
</div>
{% endfor %}

</div>

</div>

</div>

<script src="/static/app.js"></script>
