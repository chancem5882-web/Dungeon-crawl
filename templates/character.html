<!DOCTYPE html>
<html>
<body style="background:#111;color:#eee;font-family:sans-serif;">

<h1>{{name}}</h1>

<form method="POST">

<table border="1" cellpadding="8">
<tr>
    <th>Stat</th><th>Base</th><th>Buff</th><th>Equip</th><th>Total</th><th>Mod</th>
</tr>

<h2>LEVEL {{level}}</h2>

<div style="border:1px solid #ff2bd6; width:300px; padding:5px;">
    <div style="background:#222; width:100%;">
        <div style="background:#ff2bd6; width:{{ (hp/max_hp)*100 }}%; height:20px;"></div>
    </div>
    <p>{{hp}} / {{max_hp}} HP</p>
</div>    
    
{% for stat, data in stats.items() %}
<tr>
    <td>{{stat}}</td>
    <td><input type="number" name="base_{{stat}}" value="{{data.base}}"></td>
    <td><input type="number" name="buff_{{stat}}" value="{{data.buff}}"></td>
    <td>{{data.equipment}}</td>
    <td>{{data.total}}</td>
    <td>+{{data.mod}}</td>
</tr>
{% endfor %}
</table>
<h3>Core Stats</h3>

<label>Level</label>
<input type="number" name="level" value="{{level}}">

<label>HP</label>
<input type="number" name="hp" value="{{hp}}">

<label>Max HP</label>
<input type="number" name="max_hp" value="{{max_hp}}">
<h2>Equipment (auto parses)</h2>
<textarea name="equipment_text" rows="6" cols="50">{{equip_text}}</textarea>

<br><br>
<button type="submit">Save</button>

</form>

<p>🔗 Share this character:</p>
<p>{{ request.url }}</p>

</body>
</html>
